<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FleetGuard</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <noscript>FleetGuard requires JavaScript.</noscript>

  <!-- Auth Screen -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-header">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
        </svg>
        <h1>FleetGuard</h1>
        <p class="auth-subtitle">Fleet Management Platform</p>
      </div>

      <div class="tab-bar" role="tablist">
        <button class="tab active" data-tab="signin" role="tab">Sign In</button>
        <button class="tab" data-tab="signup" role="tab">Sign Up</button>
      </div>

      <div id="auth-error" class="msg msg-error hidden" role="alert"></div>
      <div id="auth-success" class="msg msg-success hidden" role="status"></div>

      <div id="panel-signin" class="tab-panel">
        <input id="signin-email" type="email" placeholder="Email" class="field" autocomplete="email">
        <div class="field-wrap">
          <input id="signin-password" type="password" placeholder="Password" class="field" autocomplete="current-password">
          <button id="toggle-pw" type="button" class="field-btn" aria-label="Show password">Show</button>
        </div>
        <button id="signin-btn" class="btn btn-primary btn-block">Sign In</button>
        <button id="forgot-btn" class="btn btn-text btn-block">Forgot Password?</button>
      </div>

      <div id="panel-signup" class="tab-panel hidden">
        <input id="signup-email" type="email" placeholder="Email" class="field" autocomplete="email">
        <input id="signup-password" type="password" placeholder="Password (min 6 chars)" class="field" autocomplete="new-password">
        <button id="signup-btn" class="btn btn-primary btn-block">Create Account</button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app-screen" class="hidden">

    <!-- Mobile sidebar overlay -->
    <div id="sidebar-overlay"></div>

    <nav id="sidebar" aria-label="Main navigation">
      <div class="brand">
        <svg class="brand-icon small" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
        </svg>
        <span>FleetGuard</span>
      </div>

      <ul class="nav-list" role="list">
        <li><a href="#" class="nav-link active" data-page="dashboard">🏠 Dashboard</a></li>
        <li><a href="#" class="nav-link" data-page="vehicles">🚗 Fleet Vehicles</a></li>
        <li><a href="#" class="nav-link" data-page="drivers">👤 Drivers</a></li>
        <li><a href="#" class="nav-link" data-page="trips">🗺️ Trip History</a></li>
        <li><a href="#" class="nav-link" data-page="maintenance">🔧 Maintenance</a></li>
        <li><a href="#" class="nav-link" data-page="fuel">⛽ Fuel Tracking</a></li>
        <li><a href="#" class="nav-link" data-page="alerts">🔔 Alerts</a></li>
        <li><a href="#" class="nav-link" data-page="analytics">📊 Analytics</a></li>
        <li><a href="#" class="nav-link" data-page="settings">⚙️ Settings</a></li>
      </ul>

      <div class="sidebar-footer">
        <div class="user-row">
          <div class="avatar" id="user-avatar">?</div>
          <div class="user-info">
            <div id="user-email" class="user-email"></div>
            <div class="user-role">Fleet Manager</div>
          </div>
        </div>
        <button id="signout-btn" class="btn btn-text">Sign Out</button>
      </div>
    </nav>

    <div class="main-area">
      <header class="topbar">
        <!-- Hamburger for mobile -->
        <button class="icon-btn" id="hamburger-btn" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
          </svg>
        </button>
        <h2 id="page-title">Dashboard</h2>
        <button class="icon-btn" id="alerts-header-btn" title="View Alerts">
          <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22" aria-hidden="true">
            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
          </svg>
          <span class="badge" id="alert-count" style="display:none">0</span>
        </button>
      </header>

      <main id="page-content" class="content"></main>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="icon-btn" id="modal-close-x" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
